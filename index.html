<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linh Labs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafbfc;
      color: #2d3748;
    }
    .container { text-align: center; padding: 2rem; }
    h1 { font-size: 2.5rem; margin-bottom: 1rem; }
    .projects { margin-top: 2rem; }
    .projects a {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: #4ECDC4;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 500;
      transition: transform 0.2s;
    }
    .projects a:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Linh Labs</h1>
    <p>Building useful things.</p>
    <div class="projects">
      <a href="/loopy">Loopy - Habit Tracker</a>
    </div>
  </div>
</body>
</html>
